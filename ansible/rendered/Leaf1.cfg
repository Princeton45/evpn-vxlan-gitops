
hostname Leaf1

! ===== features =====
feature ospf
feature bgp
feature interface-vlan
feature vn-segment-vlan-based
feature nv overlay
nv overlay evpn
feature scp-server

! ===== management baseline (must always be present) =====
username admin password 0 Cisco123! role network-admin
vrf context management
  ip route 0.0.0.0/0 192.168.100.1
interface mgmt0
  vrf member management
  ip address 192.168.100.23/24
  no shutdown

! ===== loopbacks =====
interface loopback0
  ip address 10.0.0.3/32
  ip router ospf UNDERLAY area 0.0.0.0
interface loopback1
  ip address 10.100.0.3/32
  ip router ospf UNDERLAY area 0.0.0.0

! ===== underlay point-to-point links =====
interface Ethernet1/1
  no switchport
  mtu 9216
  no ip redirects
  ip address 10.1.1.1/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown
interface Ethernet1/2
  no switchport
  mtu 9216
  no ip redirects
  ip address 10.1.1.5/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

! ===== OSPF underlay =====
router ospf UNDERLAY
  router-id 10.0.0.3

! ===== anycast gateway + tenant services =====
fabric forwarding anycast-gateway-mac 0000.2222.3333

vlan 999
  vn-segment 50001
vrf context TENANT1
  vni 50001
  rd auto
  address-family ipv4 unicast
    route-target both auto
    route-target both auto evpn
interface Vlan999
  no shutdown
  vrf member TENANT1
  ip forward

vlan 10
  vn-segment 10010
interface Vlan10
  no shutdown
  vrf member TENANT1
  ip address 10.1.10.1/24
  fabric forwarding mode anycast-gateway
vlan 20
  vn-segment 10020
interface Vlan20
  no shutdown
  vrf member TENANT1
  ip address 10.1.20.1/24
  fabric forwarding mode anycast-gateway

interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  member vni 10010
    ingress-replication protocol bgp
  member vni 10020
    ingress-replication protocol bgp
  member vni 50001 associate-vrf

evpn
  vni 10010 l2
    rd auto
    route-target import auto
    route-target export auto
  vni 10020 l2
    rd auto
    route-target import auto
    route-target export auto

interface Ethernet1/3
  switchport
  switchport mode access
  switchport access vlan 10
  no shutdown

! ===== BGP EVPN overlay =====
router bgp 65001
  router-id 10.0.0.3
  neighbor 10.0.0.1
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  neighbor 10.0.0.2
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  vrf TENANT1
    address-family ipv4 unicast
      advertise l2vpn evpn
